# =============================================================================
# Vireos Backend — Docker Compose (Base / Production)
# =============================================================================
# This file defines the core services required to run the application.
# For local development with hot-reload, use:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: vireos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vireos
      POSTGRES_USER: vireos
      POSTGRES_PASSWORD: vireos_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vireos -d vireos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vireos_network

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vireos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vireos_network

  # ---------------------------------------------------------------------------
  # Vireos API Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
      target: production
    container_name: vireos_app
    restart: unless-stopped
    env_file: .env
    environment:
      # Override with Docker service names for container-to-container networking
      DATABASE_URL: postgresql://vireos:vireos_dev@postgres:5432/vireos?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      ENABLE_HTTPS: "true"
      HTTPS_PORT: 3443
      EXTERNAL_HTTPS_PORT: ${HOST_HTTPS_PORT:-13443}
      SSL_CERT_PATH: /app/backend/certs/dev-cert.pem
      SSL_KEY_PATH: /app/backend/certs/dev-key.pem
      SSL_CERT_CN: ${SSL_CERT_CN:-localhost}
      SSL_CERT_ALT_NAMES: ${SSL_CERT_ALT_NAMES:-DNS:localhost,IP:127.0.0.1,IP:172.31.129.204}
      FRONTEND_DIST_DIR: /app/backend/public
    ports:
      - "${HOST_PORT:-13000}:3000"
      - "${HOST_HTTPS_PORT:-13443}:3443"
    volumes:
      - certs_data:/app/backend/certs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const https=require('https');https.get({hostname:'localhost',port:3443,path:'/health',rejectUnauthorized:false,headers:{'x-forwarded-proto':'https'}},r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vireos_network

  # ---------------------------------------------------------------------------
  # BullMQ Workers (separate process for job processing)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
      target: production
    container_name: vireos_worker
    restart: unless-stopped
    command: ["node", "dist/queues/workers/index.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vireos:vireos_dev@postgres:5432/vireos?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - vireos_network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certs_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  vireos_network:
    driver: bridge
